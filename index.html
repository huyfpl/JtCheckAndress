<body>

<div class="app-bar">CHECK ĐỊA CHỈ</div>

<div class="container">
    <div class="status-card" id="loadStatus">Đang tải dữ liệu từ <strong>address_data.json</strong>...</div>

    <div class="search-wrapper" id="searchBar">
        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input
                id="query"
                class="search-input"
                placeholder="Tìm tên, mã BC, người gửi, địa chỉ... (không dấu đều được)"
                autocomplete="off"
                oninput="fastSearch()"
            >
        </div>
    </div>

    <div id="results">
        <div class="hint">Nhập từ khóa để bắt đầu tìm kiếm.</div>
    </div>
</div>

<script>
const MAX_RESULTS = 80;
const MAX_EMPLOYEES_PER_CARD = 30;
const SEARCH_DEBOUNCE_MS = 70;

let GROUP_INDEX = [];
let searchTimer = null;

const VI_COLLATOR = new Intl.Collator("vi", { sensitivity: "base" });

function escapeHtml(value) {
    return (value ?? "")
        .toString()
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
}

function normalizeForSearch(value) {
    if (value === null || value === undefined) return "";

    const source = value.toString().normalize("NFC");
    let out = "";

    for (let i = 0; i < source.length;) {
        const cp = source.codePointAt(i);
        const ch = String.fromCodePoint(cp);
        const len = ch.length;

        const folded = ch
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "")
            .replace(/[đĐ]/g, "d")
            .toLowerCase();

        out += folded;
        i += len;
    }

    return out.replace(/\s+/g, " ").trim();
}

function buildFoldMap(value) {
    const source = (value ?? "").toString().normalize("NFC");
    let folded = "";
    const map = [];

    for (let i = 0; i < source.length;) {
        const cp = source.codePointAt(i);
        const ch = String.fromCodePoint(cp);
        const len = ch.length;

        const foldedChars = ch
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "")
            .replace(/[đĐ]/g, "d")
            .toLowerCase();

        for (const c of foldedChars) {
            folded += c;
            map.push(i);
        }

        i += len;
    }

    return { source, folded, map };
}

function charLengthAt(source, index) {
    const cp = source.codePointAt(index);
    if (cp === undefined) return 1;
    return cp > 0xffff ? 2 : 1;
}

function foldedRangeToSource(foldInfo, foldedStart, foldedEnd) {
    if (foldedStart < 0 || foldedEnd <= foldedStart || !foldInfo.map.length) {
        return null;
    }

    const sourceStart = foldInfo.map[foldedStart];
    const lastFoldedIndex = foldedEnd - 1;
    const sourceLast = foldInfo.map[lastFoldedIndex];

    if (sourceStart === undefined || sourceLast === undefined) return null;

    const sourceEnd = sourceLast + charLengthAt(foldInfo.source, sourceLast);

    return {
        sourceStart,
        sourceEnd,
        foldedStart,
        foldedEnd
    };
}

function extractWords(foldedText) {
    const words = [];
    const regex = /[a-z0-9]+/g;
    let match;

    while ((match = regex.exec(foldedText)) !== null) {
        words.push({
            text: match[0],
            start: match.index,
            end: match.index + match[0].length
        });
    }

    return words;
}

function roleFromWordIndex(wordIndex, wordCount) {
    if (wordCount <= 0) return 2;
    if (wordIndex === wordCount - 1) return 0;
    if (wordIndex === 0) return 2;
    return 1;
}

function roleLabel(role) {
    if (role === 0) return "ten_chinh";
    if (role === 1) return "ten_dem";
    return "ho";
}

function findTokenMatchesInWords(words, foldInfo, token) {
    if (!token) return [];

    const matches = [];

    for (const word of words) {
        let localIndex = word.text.indexOf(token);
        while (localIndex !== -1) {
            const foldedStart = word.start + localIndex;
            const foldedEnd = foldedStart + token.length;
            const sourceRange = foldedRangeToSource(foldInfo, foldedStart, foldedEnd);

            if (sourceRange) {
                matches.push({
                    token,
                    wordIndex: word.wordIndex,
                    startsWith: localIndex === 0,
                    sourceStart: sourceRange.sourceStart,
                    sourceEnd: sourceRange.sourceEnd,
                    foldedStart,
                    foldedEnd
                });
            }

            localIndex = word.text.indexOf(token, localIndex + 1);
        }
    }

    return matches;
}

function chooseBestMatch(matches) {
    if (!matches || matches.length === 0) return null;

    return matches.slice().sort((a, b) => {
        if (a.startsWith !== b.startsWith) return a.startsWith ? -1 : 1;
        if (a.wordIndex !== b.wordIndex) return a.wordIndex - b.wordIndex;
        return a.sourceStart - b.sourceStart;
    })[0];
}

function mergeRanges(ranges) {
    if (!ranges.length) return [];

    const sorted = ranges
        .filter(r => r && r.start >= 0 && r.end > r.start)
        .sort((a, b) => a.start - b.start || a.end - b.end);

    if (!sorted.length) return [];

    const merged = [sorted[0]];

    for (let i = 1; i < sorted.length; i++) {
        const last = merged[merged.length - 1];
        const curr = sorted[i];

        if (curr.start <= last.end) {
            last.end = Math.max(last.end, curr.end);
        } else {
            merged.push({ ...curr });
        }
    }

    return merged;
}

function renderHighlightedName(name, ranges) {
    if (!ranges.length) return escapeHtml(name);

    let out = "";
    let cursor = 0;

    for (const range of ranges) {
        out += escapeHtml(name.slice(cursor, range.start));
        out += `<span class="highlight">${escapeHtml(name.slice(range.start, range.end))}</span>`;
        cursor = range.end;
    }

    out += escapeHtml(name.slice(cursor));
    return out;
}

function buildTextHighlight(sourceText, foldInfo, words, queryTokens) {
    const pickedMatches = [];

    for (const token of queryTokens) {
        const tokenMatches = findTokenMatchesInWords(words, foldInfo, token);
        const best = chooseBestMatch(tokenMatches);
        if (best) pickedMatches.push(best);
    }

    const ranges = mergeRanges(
        pickedMatches.map(m => ({ start: m.sourceStart, end: m.sourceEnd }))
    );

    const matchIndexes = pickedMatches.map(m => ({
        token: m.token,
        start: m.sourceStart,
        end: m.sourceEnd,
        atWordStart: m.startsWith
    }));

    return {
        highlightedName: renderHighlightedName(sourceText, ranges),
        matchIndexes
    };
}

function evaluateField(words, foldInfo, queryTokens) {
    const matches = [];

    for (const token of queryTokens) {
        const m = chooseBestMatch(findTokenMatchesInWords(words, foldInfo, token));
        if (!m) {
            return {
                allTokensMatch: false,
                allPrefix: false,
                firstPos: Number.MAX_SAFE_INTEGER,
                matches: []
            };
        }
        matches.push(m);
    }

    return {
        allTokensMatch: true,
        allPrefix: matches.length > 0 && matches.every(m => m.startsWith),
        firstPos: matches.length > 0
            ? Math.min(...matches.map(m => m.sourceStart))
            : Number.MAX_SAFE_INTEGER,
        matches
    };
}

function uniquePickupInfos(infos) {
    const seen = new Set();
    const output = [];

    for (const info of infos) {
        const sender = (info.senderName ?? "").toString().trim();
        const address = (info.address ?? "").toString().trim();

        if (!sender && !address) continue;

        const key = `${normalizeForSearch(sender)}|${normalizeForSearch(address)}`;
        if (seen.has(key)) continue;

        seen.add(key);
        output.push({ senderName: sender, address });
    }

    return output;
}

function parsePickupInfos(item) {
    const infos = [];

    if (Array.isArray(item.thong_tin_lay_hang)) {
        for (const info of item.thong_tin_lay_hang) {
            if (!info || typeof info !== "object") continue;
            infos.push({
                senderName: (info.ten_nguoi_gui ?? "").toString().trim(),
                address: (info.dia_chi ?? "").toString().trim()
            });
        }
    }

    if (infos.length === 0) {
        if (Array.isArray(item.dia_chi)) {
            for (const address of item.dia_chi) {
                infos.push({
                    senderName: (item.ten_nguoi_gui ?? "").toString().trim(),
                    address: (address ?? "").toString().trim()
                });
            }
        } else if (typeof item.dia_chi === "string") {
            infos.push({
                senderName: (item.ten_nguoi_gui ?? "").toString().trim(),
                address: item.dia_chi.trim()
            });
        }
    }

    if (infos.length === 0) {
        infos.push({
            senderName: (item.ten_nguoi_gui ?? "").toString().trim(),
            address: ""
        });
    }

    return uniquePickupInfos(infos);
}

function buildEmployee(item, idx) {
    const fullName = (item.ten_nhan_vien ?? "").toString().trim() || `Nhân viên ${idx + 1}`;
    const maBc = (item.ma_bc ?? "").toString().trim();
    const maNhanVien = (item.ma_nhan_vien ?? item.id ?? `ROW-${idx + 1}`).toString();
    const interactionScore = Number(item.interaction_score ?? item.interactionScore ?? 0) || 0;

    const foldInfo = buildFoldMap(fullName);
    const nameFolded = normalizeForSearch(fullName);
    const bcFolded = normalizeForSearch(maBc);
    const idFolded = normalizeForSearch(maNhanVien);
    const rawWords = extractWords(nameFolded);
    const nameWords = rawWords.map((word, wIndex) => ({
        ...word,
        role: roleFromWordIndex(wIndex, rawWords.length),
        wordIndex: wIndex
    }));

    return {
        fullName,
        maBc,
        maNhanVien,
        interactionScore,
        foldInfo,
        nameFolded,
        nameWords,
        bcFolded,
        idFolded,
        searchBlob: [nameFolded, bcFolded, idFolded].join(" ").trim()
    };
}

function buildGroupIndex(rawData) {
    const groupMap = new Map();

    rawData.forEach((item, idx) => {
        const employee = buildEmployee(item, idx);
        const pickupInfos = parsePickupInfos(item);

        for (const info of pickupInfos) {
            const senderName = info.senderName || "Không rõ người gửi";
            const address = info.address || "(Không có địa chỉ)";
            const key = `${normalizeForSearch(senderName)}|${normalizeForSearch(address)}`;

            if (!groupMap.has(key)) {
                const senderFoldInfo = buildFoldMap(senderName);
                const senderFolded = normalizeForSearch(senderName);

                groupMap.set(key, {
                    id: `GROUP-${groupMap.size + 1}`,
                    senderName,
                    address,
                    senderFoldInfo,
                    senderFolded,
                    senderWords: extractWords(senderFolded).map((w, i) => ({ ...w, wordIndex: i })),
                    addressFolded: normalizeForSearch(address),
                    employeeMap: new Map(),
                    interactionTotal: 0,
                    interactionMax: 0
                });
            }

            const group = groupMap.get(key);
            const employeeKey = `${employee.maNhanVien}|${employee.maBc}|${employee.nameFolded}`;

            if (!group.employeeMap.has(employeeKey)) {
                group.employeeMap.set(employeeKey, employee);
                group.interactionTotal += employee.interactionScore;
                group.interactionMax = Math.max(group.interactionMax, employee.interactionScore);
            }
        }
    });

    return Array.from(groupMap.values()).map(group => {
        const employees = Array.from(group.employeeMap.values());
        const employeeBlob = employees.map(emp => emp.searchBlob).join(" ");
        const searchBlob = [group.senderFolded, group.addressFolded, employeeBlob].join(" ").trim();
        return {
            id: group.id,
            senderName: group.senderName,
            address: group.address,
            senderFoldInfo: group.senderFoldInfo,
            senderFolded: group.senderFolded,
            senderWords: group.senderWords,
            addressFolded: group.addressFolded,
            employees,
            employeeCount: employees.length,
            interactionTotal: group.interactionTotal,
            interactionMax: group.interactionMax,
            searchBlob
        };
    });
}

function evaluateEmployeeMatch(emp, queryNorm, queryTokens) {
    const nameEval = evaluateField(emp.nameWords, emp.foldInfo, queryTokens);
    const exactName = emp.nameFolded === queryNorm;
    const bcAll = queryTokens.every(token => emp.bcFolded.includes(token));
    const idAll = queryTokens.every(token => emp.idFolded.includes(token));
    const blobAll = queryTokens.every(token => emp.searchBlob.includes(token));

    let tier = 99;
    if (exactName) tier = 0;
    else if (nameEval.allTokensMatch && nameEval.allPrefix) tier = 1;
    else if (nameEval.allTokensMatch) tier = 2;
    else if (bcAll || idAll) tier = 3;
    else if (blobAll) tier = 4;

    return {
        tier,
        exactName,
        bcAll,
        idAll,
        blobAll,
        nameEval
    };
}

function compareEmployeeByMatch(a, b) {
    if (a.match.tier !== b.match.tier) return a.match.tier - b.match.tier;
    if (a.interaction_score !== b.interaction_score) return b.interaction_score - a.interaction_score;

    const posA = a.match.nameEval.allTokensMatch ? a.match.nameEval.firstPos : Number.MAX_SAFE_INTEGER;
    const posB = b.match.nameEval.allTokensMatch ? b.match.nameEval.firstPos : Number.MAX_SAFE_INTEGER;
    if (posA !== posB) return posA - posB;

    return VI_COLLATOR.compare(a.ten_nhan_vien, b.ten_nhan_vien);
}

function rankGroup(group, queryNorm, queryTokens) {
    if (!queryNorm) return null;

    const allTokensInBlob = queryTokens.every(token => group.searchBlob.includes(token));
    if (!allTokensInBlob) return null;

    const senderEval = evaluateField(group.senderWords, group.senderFoldInfo, queryTokens);
    const senderExact = group.senderFolded === queryNorm;
    const addressAll = queryTokens.every(token => group.addressFolded.includes(token));

    const employeeMatches = group.employees.map(emp => {
        const match = evaluateEmployeeMatch(emp, queryNorm, queryTokens);
        return { emp, match };
    }).filter(x => x.match.blobAll);

    employeeMatches.sort((a, b) => {
        if (a.match.tier !== b.match.tier) return a.match.tier - b.match.tier;
        if (a.emp.interactionScore !== b.emp.interactionScore) return b.emp.interactionScore - a.emp.interactionScore;
        return VI_COLLATOR.compare(a.emp.fullName, b.emp.fullName);
    });

    const bestEmployee = employeeMatches[0] || null;

    let tier = 99;
    let matchContext = "Khớp theo thông tin khác";
    let primaryStart = Number.MAX_SAFE_INTEGER;

    if (senderExact) {
        tier = 0;
        matchContext = "Khớp chính xác tên shop";
        primaryStart = 0;
    } else if (senderEval.allTokensMatch && senderEval.allPrefix) {
        tier = 1;
        matchContext = "Khớp tên shop";
        primaryStart = senderEval.firstPos;
    } else if (senderEval.allTokensMatch) {
        tier = 2;
        matchContext = "Khớp tên shop";
        primaryStart = senderEval.firstPos;
    } else if (bestEmployee && bestEmployee.match.tier <= 1) {
        tier = 3;
        matchContext = "Khớp tên nhân viên";
    } else if (bestEmployee && bestEmployee.match.tier === 2) {
        tier = 4;
        matchContext = "Khớp tên nhân viên";
    } else if (bestEmployee && bestEmployee.match.tier === 3) {
        tier = 5;
        matchContext = bestEmployee.match.bcAll ? "Khớp theo mã BC" : "Khớp theo mã nhân viên";
    } else if (addressAll) {
        tier = 6;
        matchContext = "Khớp theo địa chỉ";
    } else if (bestEmployee && bestEmployee.match.tier === 4) {
        tier = 7;
        matchContext = "Khớp theo thông tin nhân viên";
    } else {
        tier = 90;
    }

    return {
        tier,
        primaryStart,
        matchContext
    };
}

function compareSearchResult(a, b) {
    if (a.rank.tier !== b.rank.tier) return a.rank.tier - b.rank.tier;
    if (a.interaction_max !== b.interaction_max) return b.interaction_max - a.interaction_max;
    if (a.interaction_total !== b.interaction_total) return b.interaction_total - a.interaction_total;
    if (a.rank.primaryStart !== b.rank.primaryStart) return a.rank.primaryStart - b.rank.primaryStart;
    return VI_COLLATOR.compare(a.ten_shop, b.ten_shop);
}

function smartSearchContacts(query, data = GROUP_INDEX) {
    const queryNorm = normalizeForSearch(query);
    if (!queryNorm) return [];

    const queryTokens = queryNorm.split(" ").filter(Boolean);
    const results = [];

    for (const group of data) {
        const rank = rankGroup(group, queryNorm, queryTokens);
        if (!rank) continue;

        const shopHighlight = buildTextHighlight(group.senderName, group.senderFoldInfo, group.senderWords, queryTokens);

        const employees = group.employees.map(emp => {
            const match = evaluateEmployeeMatch(emp, queryNorm, queryTokens);
            const nameHighlight = buildTextHighlight(emp.fullName, emp.foldInfo, emp.nameWords, queryTokens);
            return {
                ma_bc: emp.maBc,
                ma_nhan_vien: emp.maNhanVien,
                ten_nhan_vien: emp.fullName,
                highlightedName: nameHighlight.highlightedName,
                matchIndexes: nameHighlight.matchIndexes,
                interaction_score: emp.interactionScore,
                match
            };
        }).sort(compareEmployeeByMatch);

        results.push({
            id: group.id,
            ten_shop: group.senderName,
            highlightedShopName: shopHighlight.highlightedName,
            dia_chi: group.address,
            matchIndexes: shopHighlight.matchIndexes,
            employees,
            employee_count: group.employeeCount,
            interaction_total: group.interactionTotal,
            interaction_max: group.interactionMax,
            matchContext: rank.matchContext,
            rank
        });
    }

    results.sort(compareSearchResult);
    return results;
}

function renderResults(results, queryRaw) {
    const container = document.getElementById("results");

    if (!queryRaw.trim()) {
        container.innerHTML = '<div class="hint">Nhập từ khóa để bắt đầu tìm kiếm.</div>';
        return;
    }

    if (results.length === 0) {
        container.innerHTML = '<div class="empty-state">Không tìm thấy dữ liệu phù hợp.</div>';
        return;
    }

    const viewData = results.slice(0, MAX_RESULTS);

    container.innerHTML = viewData.map(item => {
        const employees = item.employees.slice(0, MAX_EMPLOYEES_PER_CARD);
        const remain = Math.max(item.employees.length - employees.length, 0);

        return `
            <div class="result-card">
                <div class="meta-line">
                    <span class="label-tag">TÊN SHOP:</span>
                    <span class="shop-name">${item.highlightedShopName}</span>
                </div>

                <div class="addr-box">
                    <div class="shop-address">📍 ${escapeHtml(item.dia_chi)}</div>
                </div>

                <div class="emp-list">
                    ${employees.map(emp => `
                        <div class="emp-item">
                            <div class="meta-line">
                                <span class="bold-label">BC:</span> ${escapeHtml(emp.ma_bc || "-")}
                            </div>
                            <div class="meta-line">
                                <span class="bold-label">Tên nhân viên:</span>
                                <span class="highlight-info">${emp.highlightedName} - ${escapeHtml(emp.ma_nhan_vien)}</span>
                            </div>
                        </div>
                    `).join("")}
                    ${remain > 0 ? `<div class="meta-line">... và ${remain} nhân viên khác</div>` : ""}
                </div>
            </div>
        `;
    }).join("");
}

function fastSearch() {
    clearTimeout(searchTimer);

    searchTimer = setTimeout(() => {
        const queryInput = document.getElementById("query");
        const queryRaw = queryInput.value || "";

        if (!queryRaw.trim()) {
            renderResults([], "");
            return;
        }

        const results = smartSearchContacts(queryRaw, GROUP_INDEX);
        renderResults(results, queryRaw);
    }, SEARCH_DEBOUNCE_MS);
}

function onDataLoaded(rawData) {
    GROUP_INDEX = buildGroupIndex(rawData);
    const totalEmployees = rawData.length;

    const status = document.getElementById("loadStatus");
    status.classList.add("ok");
    status.innerHTML = `Đã tải <strong>${totalEmployees}</strong> nhân viên, gom thành <strong>${GROUP_INDEX.length}</strong> shop từ <strong>address_data.json</strong>.`;

    document.getElementById("searchBar").style.display = "block";
    document.getElementById("query").focus();
}

function onDataLoadError(err) {
    const status = document.getElementById("loadStatus");
    status.classList.remove("ok");
    status.innerHTML = `Không thể tự động đọc <strong>address_data.json</strong>. Chi tiết: ${escapeHtml(err.message || String(err))}.`;

    const container = document.getElementById("results");
    container.innerHTML = '<div class="empty-state">Vui lòng chạy trang bằng web server nội bộ (ví dụ: Live Server) để trình duyệt cho phép đọc file JSON.</div>';
}

async function loadJsonData() {
    try {
        const response = await fetch("./address_data.json", { cache: "no-store" });
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        if (!Array.isArray(data)) {
            throw new Error("JSON không phải mảng dữ liệu.");
        }

        onDataLoaded(data);
    } catch (fetchErr) {
        try {
            const xhr = new XMLHttpRequest();
            xhr.open("GET", "./address_data.json", false);
            xhr.send(null);

            if (xhr.status === 200 || xhr.status === 0) {
                const data = JSON.parse(xhr.responseText);
                if (!Array.isArray(data)) {
                    throw new Error("JSON không phải mảng dữ liệu.");
                }

                onDataLoaded(data);
                return;
            }

            throw new Error(`XHR status ${xhr.status}`);
        } catch (xhrErr) {
            onDataLoadError(fetchErr || xhrErr);
        }
    }
}

loadJsonData();

// Expose để bạn có thể gọi trực tiếp ở console nếu cần.
window.smartSearchContacts = smartSearchContacts;
</script>
